<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Student Information System</h2>

        <div class="form">
            <input type="text" id="name" placeholder="Full Name">
            <input type="text" id="section" placeholder="Section">
            <input type="number" id="age" placeholder="Age">
            
            <select id="gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <input type="text" id="course" placeholder="Course">
            <input type="text" id="yearLevel" placeholder="Year Level">
            <input type="text" id="address" placeholder="Address">
            <input type="number" id="contact" placeholder="Contact Number">

            <button id="submitBtn" onclick="addStudent()">Add</button>
        </div>

        <input type="text" id="search" placeholder="Search..." onkeyup="searchStudent()">

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Section</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Course</th>
                    <th>Year Level</th>
                    <th>Address</th>
                    <th>Contact</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentTable">
                <!-- Data will appear here -->
            </tbody>
        </table>
    </div>

    <script src="student.js"></script>
</body>
</html>
